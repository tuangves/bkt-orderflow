<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>OrderFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#f5f6fa;font-family:'Sarabun',sans-serif;color:#e2e8f0;min-height:100vh}
    input,button,textarea{font-family:'Sarabun',sans-serif}
    input:focus,textarea:focus{outline:2px solid #f59e0b;outline-offset:-1px;border-radius:8px}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    input[type=checkbox]{accent-color:#22c55e;width:15px;height:15px;cursor:pointer}
    input[type=radio]{accent-color:#f59e0b;cursor:pointer}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#f0f2f7}
    ::-webkit-scrollbar-thumb{background:#c8d0e7;border-radius:3px}
    .ocard:hover{border-color:#f59e0b88!important;background:#f0f2f7!important}
    .nb:active{opacity:0.6;transform:scale(0.95)}
    .sugg-item:hover{background:#1a3354!important}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
    @media(max-width:640px){
      .desktop-only{display:none!important}
      .grid-2{grid-template-columns:1fr!important}
      nav{flex-wrap:wrap;gap:6px;padding:6px 10px!important}
      .ocard{padding:14px!important}
      .filter-bar{flex-wrap:wrap;gap:6px}
    }
    .ct-btn:hover{opacity:0.85}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media print{
      body *{visibility:hidden!important}
      #quote-area,#quote-area *{visibility:visible!important}
      #quote-area{position:fixed!important;top:0!important;left:0!important;width:100%!important;background:white!important;padding:15mm!important;color:#000!important}
    }
  </style>
</head>

function uid(){return Math.random().toString(36).slice(2,9)}
function today(){const d=new Date();return `${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}`}

// Format Firebase timestamp → "16/4/2569 14:32"
function formatDT(ts){
  if(!ts)return"—";
  try{
    const d=ts.toDate?ts.toDate():new Date(ts);
    const year=d.getFullYear()+543;
    const h=String(d.getHours()).padStart(2,"0");
    const m=String(d.getMinutes()).padStart(2,"0");
    return `${d.getDate()}/${d.getMonth()+1}/${year} ${h}:${m} น.`;
  }catch{return"—";}
}

// Format just the time: "14:32 น."
function formatTime(ts){
  if(!ts)return"";
  try{const d=ts.toDate?ts.toDate():new Date(ts);return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")} น.`;}catch{return"";}
}

async function compress(file){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{const c=document.createElement("canvas");const r=Math.min(640/img.width,640/img.height,1);c.width=img.width*r;c.height=img.height*r;c.getContext("2d").drawImage(img,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",0.6));};
    img.src=URL.createObjectURL(file);
  });
}

// Auto-format phone: any input → xxx-xxx-xxxx
function fmtPhone(raw){
  const d=(raw||"").replace(/\D/g,"");
  if(d.length<=3)return d;
  if(d.length<=6)return `${d.slice(0,3)}-${d.slice(3)}`;
  if(d.length<=10)return `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6)}`;
  return `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6,10)}`;
}

// Get next quotation number for a salesperson (atomic counter in Firestore)
async function getNextQuotationNumber(salesperson){
  const ref=db.collection("quotation_counters").doc(salesperson);
  return await db.runTransaction(async tx=>{
    const doc=await tx.get(ref);
    const next=(doc.exists?doc.data().count:0)+1;
    tx.set(ref,{count:next});
    return next;
  });
}

function extractCoords(url){
  if(!url)return null;
  const m1=url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);if(m1)return{lat:parseFloat(m1[1]),lng:parseFloat(m1[2])};
  const m2=url.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);if(m2)return{lat:parseFloat(m2[1]),lng:parseFloat(m2[2])};
  return null;
}
async function getRoadKm(from,to){
  try{
    const res=await fetch(`https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_KEY}&start=${from.lng},${from.lat}&end=${to.lng},${to.lat}`);
    const data=await res.json();
    const m=data.features?.[0]?.properties?.segments?.[0]?.distance;
    return m!=null?(m/1000).toFixed(1):null;
  }catch{return null;}
}

function exportExcel(orders){
  const wb=XLSX.utils.book_new();
  const appr=orders.filter(o=>o.status==="approved");
  const rows=[["ใบสรุปคำสั่งซื้อ"],["ลำดับ","ฝ่ายขาย","รายการสินค้า","ส่งที่/โครงการ","ชื่อลูกค้า","เบอร์โทร","กำไรรวม"]];
  let seq=1;const byP={};
  appr.forEach(o=>o.items.forEach(it=>{const gp=parseFloat(it.profitTotal)||0;rows.push([seq++,o.salesperson,it.product,o.projectLocation,o.customerName,o.customerPhone||"",gp]);byP[o.salesperson]=(byP[o.salesperson]||0)+gp;}));
  rows.push([],["สรุปกำไรต่อฝ่ายขาย"]);Object.entries(byP).forEach(([k,v])=>rows.push([k,v]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),"ใบสรุป");
  appr.forEach(o=>{
    const r=[[`วันที่: ${o.date}`,"",`ลูกค้า: ${o.customerName}`,"",`โทร: ${o.customerPhone||""}`],[`ฝ่ายขาย: ${o.salesperson}`,"",`ส่งที่: ${o.projectLocation}`],[],["ลำดับ","รายการสินค้า","จำนวน","หน่วย","ทุน/หน่วย","กำไร/หน่วย","ราคาขาย/หน่วย","กำไรรวม"]];
    o.items.forEach((it,i)=>r.push([i+1,it.product,it.qty,it.unit,it.cost,it.profit,it.salePrice,it.profitTotal]));
    const tot=o.items.reduce((s,it)=>s+(parseFloat(it.profitTotal)||0),0);r.push(["","","","","","","รวมกำไร",tot]);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(r),`D ${o.salesperson} ${o.items[0]?.product||""} ${o.projectLocation}`.slice(0,31));
  });
  const d=new Date();XLSX.writeFile(wb,`${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}_orders.xlsx`);
}

// ── Autocomplete ──
function AutoInput({value,onChange,onSelect,suggestions=[],placeholder,style}){
  const [focused,setFocused]=useState(false);const ref=useRef();
  const filtered=value?suggestions.filter(s=>s.label.toLowerCase().includes(value.toLowerCase())&&s.label!==value):suggestions;
  const show=focused&&filtered.length>0;
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setFocused(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <input value={value} onChange={e=>{onChange(e.target.value);setFocused(true);}} onFocus={()=>setFocused(true)} placeholder={placeholder} style={{...INP,...style}} autoComplete="off"/>
      {show&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:200,background:"#0d1a2e",border:`1px solid ${C.border}`,borderRadius:8,marginTop:4,boxShadow:"0 8px 24px #00000066",animation:"fadeIn .12s ease",maxHeight:200,overflowY:"auto"}}>
          {filtered.slice(0,8).map((s,i)=>(
            <div key={i} className="sugg-item" onMouseDown={e=>{e.preventDefault();onSelect?onSelect(s):onChange(s.label);setFocused(false);}} style={{padding:"10px 14px",cursor:"pointer",fontSize:14,borderBottom:`1px solid ${C.border}22`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>{s.label}</span>{s.sub&&<span style={{color:C.muted,fontSize:12}}>{s.sub}</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MapsCard({customerLocation}){
  const [distances,setDistances]=useState({bkt2:null,bkt3:null});
  const [loading,setLoading]=useState(false);
  const coords=extractCoords(customerLocation||"");
  const custUrl=customerLocation?.startsWith("http")?customerLocation:null;
  useEffect(()=>{
    if(!coords){setDistances({bkt2:null,bkt3:null});return;}
    setLoading(true);
    Promise.all([getRoadKm(BKT[2],coords),getRoadKm(BKT[3],coords)]).then(([d2,d3])=>{setDistances({bkt2:d2,bkt3:d3});setLoading(false);});
  },[customerLocation]);
  const spinner=<span style={{display:"inline-block",width:14,height:14,border:"2px solid #ffffff33",borderTopColor:C.accent,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}></span>;
  return(
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:18,marginBottom:16}}>
      <Lbl>แผนที่ / ระยะทาง</Lbl>

          {coords?(
            <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{color:C.muted,fontSize:13}}>ระยะทางจาก:</span>
              <div style={{display:"flex",alignItems:"center",gap:8,background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 18px"}}>
                <span style={{fontSize:13,color:C.muted,fontWeight:600}}>🏢 BKT 2</span>

                <span style={{fontSize:13,color:C.muted,fontWeight:600}}>🏢 BKT 3</span>

              </div>
              {!loading&&distances.bkt2&&distances.bkt3&&(
                <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"8px 14px",fontSize:13,color:C.green}}>
                  ✅ ส่งจาก {parseFloat(distances.bkt2)<=parseFloat(distances.bkt3)?"BKT 2":"BKT 3"} ใกล้กว่า

    </div>
  );
}

function LoginScreen({onLogin}){
  const [pin,setPin]=useState(""),[ shake,setShake]=useState(false);
  const tryPin=next=>{if(next.length<4)return;const user=USERS[next];if(user){setTimeout(()=>onLogin(next,user),120);return;}const hasPfx=Object.keys(USERS).some(k=>k.startsWith(next)&&k.length>next.length);if(!hasPfx){setShake(true);setTimeout(()=>{setPin("");setShake(false);},600);}};
  const press=d=>{if(d==="⌫"){setPin(p=>p.slice(0,-1));return;}const next=pin+d;if(next.length>6)return;setPin(next);tryPin(next);};
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#f5f6fa 0%,#eef0f7 100%)",padding:20}}>
      <div style={{marginBottom:36,textAlign:"center"}}>
        <img src={LOGO_SRC} alt="BKT" style={{height:110,width:"auto",marginBottom:8,filter:"drop-shadow(0 2px 8px #0000001a)"}}/>
        <div style={{fontSize:13,color:C.muted,marginTop:2,letterSpacing:0.3}}>ใส่ PIN ของคุณเพื่อเข้าใช้งาน</div>
      </div>
      <div style={{background:"#fff",borderRadius:24,padding:"28px 36px 32px",boxShadow:"0 8px 32px #0000000e,0 1px 4px #0000000a",display:"inline-block"}}>
        <div style={{display:"flex",gap:14,marginBottom:28,justifyContent:"center",animation:shake?"shake 0.4s ease":"none"}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:16,height:16,borderRadius:"50%",background:i<pin.length?C.accent:"#e2e6ef",transition:"background .12s,transform .1s",transform:i<pin.length?"scale(1.2)":"scale(1)"}}/>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,76px)",gap:10}}>
          {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i)=>(
            <button key={i} className="nb" onClick={()=>k!==""&&press(k)} style={{
              background:k===""?"transparent":k==="⌫"?"#f3f4f6":"#fff",
              border:k===""?"none":"1px solid #e8eaf0",
              borderRadius:12,height:66,
              fontSize:k==="⌫"?20:22,
              color:k==="⌫"?C.muted:C.text,
              cursor:k===""?"default":"pointer",
              fontWeight:600,
              boxShadow:k===""?"none":"0 1px 4px #0000000d",
            }}>{k}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function NewOrderForm({userName,onDone,onCancel}){
  const [f,setF]=useState({customerName:"",customerPhone:"",projectLocation:"",customerLocation:"",creditTerm:"",requestedDelivery:"",orderNote:"",photo:"",items:[blank()]});
  const [saving,setSaving]=useState(false);
  const [sugg,setSugg]=useState({customers:[],projects:[]});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  useEffect(()=>{
    db.collection("orders").where("salesperson","==",userName).get().then(snap=>{
      const cm={};const ps=new Set();
      snap.docs.forEach(d=>{const o=d.data();if(o.customerName)cm[o.customerName]=o.customerPhone||"";if(o.projectLocation)ps.add(o.projectLocation);});
      // Projects: also include from all salespeople (shared)
      db.collection("orders").get().then(snap2=>{
        snap2.docs.forEach(d=>{const o=d.data();if(o.projectLocation)ps.add(o.projectLocation);});
        setSugg({customers:Object.entries(cm).map(([n,p])=>({label:n,sub:p,phone:p})),projects:[...ps].map(p=>({label:p}))});
      });
    });
  },[]);

  const handlePhoto=async e=>{const file=e.target.files[0];if(!file)return;set("photo",await compress(file));};

  const submit=async()=>{
    if(!f.customerName||!f.projectLocation||f.items.some(i=>!i.product||!i.qty))return alert("กรุณากรอกข้อมูลให้ครบ");
    setSaving(true);
    try{
      const qNum=await getNextQuotationNumber(f.salesperson||userName);
      const qId=`${f.salesperson||userName}-${String(qNum).padStart(3,"0")}`;
      await db.collection("orders").add({
        salesperson:userName,date:today(),quotationId:qId,
        customerName:f.customerName,customerPhone:f.customerPhone,
        projectLocation:f.projectLocation,customerLocation:f.customerLocation,
        creditTerm:f.creditTerm,orderNote:f.orderNote||"",requestedDelivery:f.requestedDelivery||"",photo:f.photo,items:f.items,
        orderNote:f.orderNote||"",requestedDelivery:f.requestedDelivery||"",status:"pending_cost",vatMode:"cash",
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
      onDone();
    }catch(e){alert("เกิดข้อผิดพลาด: "+e.message);setSaving(false);}
  };

  const card={background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:16};
  const coordsOk=f.customerLocation&&extractCoords(f.customerLocation);

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
        <Btn variant="ghost" onClick={onCancel} small>← กลับ</Btn>
        <h2 style={{margin:0,fontSize:19,fontWeight:700}}>คำสั่งซื้อใหม่</h2>
      </div>

      <div style={card}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:16,marginBottom:16}}>
          <div><Lbl>ฝ่ายขาย</Lbl><div style={{color:C.accent,fontWeight:700,fontSize:16,padding:"10px 0"}}>{userName}</div></div>
          <div><Lbl>ส่งที่ / โครงการ *</Lbl><AutoInput value={f.projectLocation} onChange={v=>set("projectLocation",v)} onSelect={s=>set("projectLocation",s.label)} suggestions={sugg.projects} placeholder="เช่น หลักสี่"/></div>
          <div><Lbl>ชื่อลูกค้า *</Lbl><AutoInput value={f.customerName} onChange={v=>set("customerName",v)} onSelect={s=>{set("customerName",s.label);set("customerPhone",s.phone||"");}} suggestions={sugg.customers} placeholder="ชื่อลูกค้า"/></div>
          <div><Lbl>เบอร์โทร</Lbl><input value={f.customerPhone} onChange={e=>set("customerPhone",fmtPhone(e.target.value))} placeholder="094-994-9978" type="tel" style={INP}/></div>
        </div>

        {/* Credit Term */}
        <div style={{marginBottom:16}}>
          <Lbl>Credit Term</Lbl>
          <CreditTermSelector value={f.creditTerm} onChange={v=>set("creditTerm",v)}/>
          {!f.creditTerm&&<div style={{color:C.muted,fontSize:12,marginTop:6}}>กรุณาเลือก Credit Term</div>}
        </div>

        {/* Delivery date */}
        <div style={{marginBottom:16}}>
          <Lbl>กำหนดส่งที่ต้องการ</Lbl>
          <input type="date" value={f.requestedDelivery} onChange={e=>set("requestedDelivery",e.target.value)} style={{...INP,colorScheme:"light"}}/>
        </div>

        {/* Maps link */}
        <div style={{marginBottom:16}}>
          <Lbl>ลิงก์ Google Maps ของลูกค้า (ถ้ามี)</Lbl>
          <input value={f.customerLocation} onChange={e=>set("customerLocation",e.target.value)} placeholder="วางลิงก์จาก address bar ของ Google Maps..." style={{...INP,fontSize:13}}/>
          {f.customerLocation&&<div style={{marginTop:6,fontSize:12}}>{coordsOk?<span style={{color:C.green}}>✅ อ่านพิกัดได้</span>:<span style={{color:C.orange}}>⚠️ ใช้ลิงก์จาก address bar (google.com/maps)</span>}</div>}
        </div>

        {/* Photo */}
        <div>
          <Lbl>แนบรูปใบเสนอราคา (ถ้ามี)</Lbl>
          <input type="file" accept="image/*" onChange={handlePhoto} style={{color:C.muted,fontSize:13}}/>
          {f.photo&&<img src={f.photo} alt="" style={{marginTop:10,maxWidth:"100%",maxHeight:200,borderRadius:8}}/>}
        </div>
      </div>

      <div style={card}><Lbl>รายการสินค้า *</Lbl><ItemsTable items={f.items} onChange={v=>set("items",v)} mode="edit-base"/></div>
      <Btn onClick={submit} disabled={saving}>{saving?"กำลังบันทึก...":"ส่งคำสั่งซื้อ →"}</Btn>
    </div>
  );
}

// ══════════════════════════════════════
// PURCHASING GRID — Spreadsheet style
// Columns = factories/sources, Rows = products
// ══════════════════════════════════════
function PurchasingGrid({items,initSources,readOnly,onApprove,saving}){
  const [sources,setSources]=useState(()=>{
    if(initSources&&initSources.length>0)return initSources;
    // Try reconstructing from old per-item format
    const first=items[0];
    if(first?.costSources?.length>0)
      return first.costSources.map(s=>({id:s.id,name:s.name||"",vat:!!s.vat,delivery:!!s.delivery,unloading:!!s.unloading,note:""}));
    return[];
  });

  const [cells,setCells]=useState(()=>{
    const c={};
    items.forEach(item=>{
      if(item.costs){Object.entries(item.costs).forEach(([sid,val])=>{c[`${item.id}_${sid}`]=val;});}
      else if(item.costSources){item.costSources.forEach(s=>{if(s.cost)c[`${item.id}_${s.id}`]=s.cost;});}
    });
    return c;
  });
  const [selSrc,setSelSrc]=useState(()=>{
    const s={};items.forEach(item=>{if(item.selectedSource)s[item.id]=item.selectedSource;});return s;
  });
  const [profits,setProfits]=useState(()=>{
    const p={};items.forEach(item=>{if(item.profit)p[item.id]=item.profit;});return p;
  });
  const [notes,setNotes]=useState(()=>{
    const n={};items.forEach(item=>{if(item.note)n[item.id]=item.note;});return n;
  });
  const [purchasingNote,setPurchasingNote]=useState(()=>{
    return items[0]?.purchasingNote||"";
  });

  // Sync top scrollbar width with table width
  useEffect(()=>{
    const sync=()=>{
      const wrap=document.getElementById("grid-table-wrap");
      const inner=document.getElementById("top-scroll-inner");
      if(wrap&&inner)inner.style.width=wrap.scrollWidth+"px";
    };
    sync();
    window.addEventListener("resize",sync);
    return()=>window.removeEventListener("resize",sync);
  },[sources,items]);

  const getCell=(iid,sid)=>cells[`${iid}_${sid}`]||"";
  const setCell=(iid,sid,val)=>setCells(c=>({...c,[`${iid}_${sid}`]:val}));
  const updSrc=(id,field,val)=>setSources(s=>s.map(x=>x.id===id?{...x,[field]:val}:x));
  const rmSrc=(id)=>{
    setSources(s=>s.filter(x=>x.id!==id));
    setCells(c=>{const n={...c};items.forEach(item=>delete n[`${item.id}_${id}`]);return n;});
    setSelSrc(s=>{const n={...s};Object.keys(n).forEach(k=>{if(n[k]===id)delete n[k];});return n;});
  };
  const addSrc=()=>setSources(s=>[...s,{id:uid(),name:"",vat:false,delivery:false,unloading:false,note:""}]);

  const getSP=(iid)=>{
    const sid=selSrc[iid];if(!sid)return null;
    const cost=parseFloat(getCell(iid,sid))||0,profit=parseFloat(profits[iid])||0;
    return cost+profit;
  };
  const getPT=(iid)=>{
    const item=items.find(i=>i.id===iid);
    return(parseFloat(profits[iid])||0)*(parseFloat(item?.qty)||0);
  };

  const handleApprove=()=>{
    for(const item of items){
      if(!selSrc[item.id]||!getCell(item.id,selSrc[item.id]))
        return alert(`กรุณาเลือกแหล่งทุน (คลิก ○) สำหรับ "${item.product}"`);
      if(!profits[item.id])
        return alert(`กรุณาใส่กำไร/หน่วย สำหรับ "${item.product}"`);
    }
    const updatedItems=items.map(item=>{
      const sid=selSrc[item.id];
      const cost=parseFloat(getCell(item.id,sid))||0,profit=parseFloat(profits[item.id])||0,qty=parseFloat(item.qty)||0;
      const costsObj={};sources.forEach(s=>{costsObj[s.id]=getCell(item.id,s.id);});
      return{...item,costs:costsObj,selectedSource:sid,cost:cost.toString(),profit:profit.toString(),salePrice:(cost+profit).toFixed(2),profitTotal:(profit*qty).toFixed(2),note:notes[item.id]||"",purchasingNote};
    });
    onApprove(updatedItems,sources,purchasingNote);
  };

  const ti2={...INP,padding:"5px 8px",fontSize:12,background:"#f9fafb",textAlign:"center"};
  const TH={padding:"8px 8px",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.4,background:"#f3f4f6",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap",color:"#111827"};
  const TD={padding:"7px 8px",verticalAlign:"middle",borderBottom:`1px solid ${C.border}22`,color:"#111827"};
  const totalPT=items.reduce((s,item)=>s+getPT(item.id),0);

  const tableRef=useRef(null);
  const mirrorRef=useRef(null);
  const innerRef=useRef(null);
  const syncMirror=()=>{if(innerRef.current&&tableRef.current)innerRef.current.style.width=tableRef.current.scrollWidth+"px";};
  useEffect(()=>{syncMirror();window.addEventListener("resize",syncMirror);return()=>window.removeEventListener("resize",syncMirror);},[sources]);

  return(
    <div>
      {!readOnly&&sources.length===0&&(
        <div style={{marginBottom:12,padding:"10px 14px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,fontSize:13,color:"#1d4ed8"}}>
          💡 กด <strong>+ เพิ่มแหล่งทุน</strong> เพื่อเพิ่มคอลัมน์ราคาจากแต่ละโรงงาน แล้วกรอกราคาและกด ○ เพื่อเลือกใช้
        </div>
      )}
      {/* Top scroll mirror */}
      <div ref={mirrorRef} onScroll={e=>{if(tableRef.current)tableRef.current.scrollLeft=e.target.scrollLeft;}} style={{overflowX:"auto",overflowY:"hidden",height:14,marginBottom:4,borderRadius:4}}>
        <div ref={innerRef} style={{height:1}}></div>
      </div>
      {/* Scrollable table */}
      <div ref={tableRef} onScroll={e=>{if(mirrorRef.current)mirrorRef.current.scrollLeft=e.target.scrollLeft;setTimeout(syncMirror,0);}} style={{overflowX:"auto"}}>
      <table style={{borderCollapse:"collapse",fontSize:13,minWidth:600}}>
        <thead>
          <tr>
            <th style={{...THsticky,width:28,left:0,textAlign:"left",borderRight:"1px solid #e5e7eb"}}>#</th>
            <th style={{...THsticky,textAlign:"left",minWidth:150,left:28}}>รายการสินค้า</th>
            <th style={{...TH,width:58,textAlign:"center"}}>จำนวน</th>
            <th style={{...TH,width:48,textAlign:"center"}}>หน่วย</th>
            {sources.map(src=>(
              <th key={src.id} style={{...TH,minWidth:130,background:readOnly?"#f3f4f6":"#f0fdf4",textAlign:"center"}}>
                <div style={{fontSize:10,color:"#6b7280",marginBottom:3}}>ทุน /</div>
                {readOnly
                  ?<div style={{fontWeight:700,fontSize:12,color:"#111827"}}>{src.name||"—"}</div>
                  :<div style={{display:"flex",alignItems:"center",gap:4}}>
                    <input value={src.name} onChange={e=>updSrc(src.id,"name",e.target.value)} placeholder="ชื่อโรงงาน" style={{...ti2,flex:1,fontWeight:700}}/>
                    <button onClick={()=>rmSrc(src.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:16,lineHeight:1,flexShrink:0}}>×</button>
                  </div>
                }
                {/* VAT / NO VAT badge — shows current status */}
                <div style={{marginTop:5}}>
                  <span
                    onClick={()=>!readOnly&&updSrc(src.id,"vat",!src.vat)}
                    style={{
                      display:"inline-block",
                      background:src.vat?"#dcfce7":"#fee2e2",
                      color:src.vat?"#15803d":"#dc2626",
                      border:`1px solid ${src.vat?"#86efac":"#fca5a5"}`,
                      borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700,
                      cursor:readOnly?"default":"pointer",
                      userSelect:"none",letterSpacing:0.3,
                    }}
                    title={readOnly?"":src.vat?"คลิกเพื่อเปลี่ยนเป็น NO VAT":"คลิกเพื่อเปลี่ยนเป็น VAT"}
                  >
                    {src.vat?"VAT":"NO VAT"}
                  </span>
                </div>
              </th>
            ))}
            {!readOnly&&(
              <th style={{...TH,width:110,background:"#f0fdf4"}}>
                <button onClick={addSrc} style={{background:"#16a34a",border:"none",borderRadius:6,color:"#fff",padding:"5px 8px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>+ เพิ่มแหล่งทุน</button>
              </th>
            )}
            <th style={{...THsticky,width:90,right:280,color:C.orange,textAlign:"center",borderLeft:"1px solid #e5e7eb"}}>กำไร/หน่วย</th>
            <th style={{...THsticky,width:100,right:180,color:"#15803d",textAlign:"center"}}>ราคาขาย ⚡</th>
            <th style={{...THsticky,width:100,right:90,color:"#15803d",textAlign:"center"}}>กำไรรวม ⚡</th>
            <th style={{...THsticky,width:90,right:0,textAlign:"left"}}>หมายเหตุ</th>
          </tr>
        </thead>
        <tbody>
          {items.map((item,idx)=>{
            const sp=getSP(item.id),pt=getPT(item.id);
            return(
              <tr key={item.id} style={{background:idx%2===0?"transparent":"#fafafa"}}>
                <td style={{...TDsticky,left:0,color:"#6b7280",fontWeight:700,borderRight:"1px solid #e5e7eb"}}>{idx+1}</td>
                <td style={{...TDsticky,left:28,fontWeight:600,color:"#111827"}}>{item.product}</td>
                <td style={{...TD,textAlign:"center"}}>{item.qty}</td>
                <td style={{...TD,textAlign:"center",color:"#374151"}}>{item.unit}</td>

                {sources.map(src=>{
                  const isSel=selSrc[item.id]===src.id,val=getCell(item.id,src.id);
                  return(
                    <td key={src.id} style={{...TD,textAlign:"center",background:isSel?"#f0fdf4":"transparent",outline:isSel?"2px solid #16a34a":"none",outlineOffset:"-1px"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                        {!readOnly&&(
                          <input type="radio" name={`src_${item.id}`} checked={isSel}
                            onChange={()=>setSelSrc(s=>({...s,[item.id]:src.id}))}
                            style={{cursor:"pointer",accentColor:"#16a34a",width:14,height:14}}
                            title="ใช้ราคานี้"/>
                        )}
                        {readOnly
                          ?<span style={{color:isSel?"#15803d":"#111827",fontWeight:isSel?800:400,fontSize:14}}>{val||"—"}</span>
                          :<input value={val} type="number" onChange={e=>setCell(item.id,src.id,e.target.value)}
                            placeholder="—"
                            style={{...ti2,width:72,color:isSel?"#15803d":C.text,fontWeight:isSel?700:400,background:isSel?"#dcfce7":"#f9fafb",border:isSel?"1px solid #86efac":`1px solid ${C.border}`}}/>
                        }
                        {readOnly&&isSel&&<span style={{color:"#16a34a",fontSize:12}}>✓</span>}
                      </div>
                    </td>
                  );
                })}
                {!readOnly&&<td style={TD}></td>}

                <td style={{...TDsticky,right:280,textAlign:"center",borderLeft:"1px solid #e5e7eb"}}>
                  {readOnly
                    ?<span style={{color:C.orange,fontWeight:600}}>{item.profit||"—"}</span>
                    :<input value={profits[item.id]||""} type="number" onChange={e=>setProfits(p=>({...p,[item.id]:e.target.value}))} placeholder="0" style={{...ti2,width:80,color:C.orange,border:`1px solid ${C.border}`}}/>
                  }
                </td>
                <td style={{...TDsticky,right:180,textAlign:"center"}}>
                  <div style={{background:"#dcfce7",borderRadius:6,padding:"5px 8px",color:"#15803d",fontWeight:700}}>
                    {sp!=null?sp.toFixed(2):"—"}
                  </div>
                </td>
                <td style={{...TDsticky,right:90,textAlign:"center"}}>
                  <div style={{background:"#dcfce7",borderRadius:6,padding:"5px 8px",color:"#15803d",fontWeight:700}}>
                    {pt>0?pt.toLocaleString():"—"}
                  </div>
                </td>
                <td style={{...TDsticky,right:0,width:90}}>
                  {readOnly
                    ?<span style={{color:C.muted,fontSize:12}}>{item.note||"—"}</span>
                    :<input value={notes[item.id]||""} onChange={e=>setNotes(n=>({...n,[item.id]:e.target.value}))} placeholder="หมายเหตุ" style={{...ti2,textAlign:"left",border:`1px solid ${C.border}`}}/>
                  }
                </td>
              </tr>
            );
          })}
        </tbody>
        <tfoot>
          <tr style={{background:"#f8f9fc"}}>
            <td colSpan={4} style={{padding:"10px 8px",fontSize:11,color:"#374151",fontStyle:"italic"}}>
              {!readOnly&&sources.length>0?"○ คลิกเลือกแหล่งทุนที่ต้องการใช้สำหรับแต่ละรายการ":""}
            </td>
            {sources.map(src=>(
              <td key={src.id} style={{padding:"10px 10px",verticalAlign:"top",borderTop:`1px solid ${C.border}`}}>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {["delivery","unloading"].map(f=>(
                    <label key={f} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,cursor:readOnly?"default":"pointer",color:src[f]?"#15803d":"#374151",userSelect:"none"}}>
                      <input type="checkbox" checked={!!src[f]} onChange={e=>!readOnly&&updSrc(src.id,f,e.target.checked)} disabled={readOnly} style={{accentColor:"#16a34a"}}/>
                      {f==="delivery"?"รวมส่ง":"รวมลง"}
                    </label>
                  ))}
                  {readOnly
                    ?src.note&&<div style={{fontSize:11,color:C.muted,marginTop:3,borderTop:`1px dashed ${C.border}`,paddingTop:3}}>{src.note}</div>
                    :<input value={src.note||""} onChange={e=>updSrc(src.id,"note",e.target.value)} placeholder="หมายเหตุคอลัมน์" style={{...ti2,fontSize:11,marginTop:4,textAlign:"left",border:`1px solid ${C.border}`}}/>
                  }
                </div>
              </td>
            ))}
            {!readOnly&&<td style={{padding:"10px 8px",borderTop:`1px solid ${C.border}`}}></td>}
            <td style={{...TDsticky,right:280,padding:"10px 8px",borderTop:`1px solid ${C.border}`,borderLeft:"1px solid #e5e7eb",background:"#f8f9fc"}}></td>
            <td style={{...TDsticky,right:180,padding:"10px 8px",borderTop:`1px solid ${C.border}`,background:"#f8f9fc"}}></td>
            <td style={{...TDsticky,right:90,padding:"10px 8px",borderTop:`1px solid ${C.border}`,background:"#f8f9fc",textAlign:"center"}}>
              {totalPT>0&&<div style={{background:"#dcfce7",borderRadius:6,padding:"5px 8px",color:"#15803d",fontWeight:800,fontSize:14}}>{totalPT.toLocaleString()}</div>}
            </td>
            <td style={{...TDsticky,right:0,padding:"10px 8px",borderTop:`1px solid ${C.border}`,background:"#f8f9fc"}}></td>
          </tr>
        </tfoot>
      </table>
      </div>{/* end scrollable table wrapper */}

      {/* Big หมายเหตุ from purchasing */}
      <div style={{marginTop:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>📝 หมายเหตุจัดซื้อ (ถึงฝ่ายขาย)</div>
        {readOnly
          ?<div style={{background:"#fef9c3",border:"1px solid #fde047",borderRadius:10,padding:"12px 16px",fontSize:14,color:"#713f12",lineHeight:1.7,minHeight:48}}>
            {items[0]?.purchasingNote||<span style={{color:"#a16207",fontStyle:"italic"}}>ไม่มีหมายเหตุ</span>}
          </div>
          :<textarea
            value={purchasingNote}
            onChange={e=>setPurchasingNote(e.target.value)}
            placeholder="เช่น สั่งได้เฉพาะล็อต 600 ขึ้นไป, ราคานี้รวมค่าส่งแล้ว, รอยืนยันสต็อกก่อน..."
            rows={3}
            style={{...INP,resize:"vertical",lineHeight:1.7,fontSize:14,borderRadius:10,color:"#111827"}}
          />
        }
      </div>

      {!readOnly&&(
        <div style={{marginTop:14}}>
          <Btn variant="green" onClick={handleApprove} disabled={saving} full>
            {saving?"กำลังบันทึก...":"✅ อนุมัติราคาขาย"}
          </Btn>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════
// PURCHASING TABLE — Excel-style compact view
// Each product = one row, cost sources expand inline
// ══════════════════════════════════════
function PurchasingTable({items,onChange,readOnly}){
  const [expanded,setExpanded]=useState({});
  const toggle=id=>setExpanded(p=>({...p,[id]:!p[id]}));

  const updItem=(id,field,val)=>{
    onChange(items.map(it=>{
      if(it.id!==id)return it;
      const n={...it,[field]:val};
      if(["cost","profit"].includes(field)){
        const c=parseFloat(field==="cost"?val:n.cost)||0;
        const p=parseFloat(field==="profit"?val:n.profit)||0;
        const q=parseFloat(n.qty)||0;
        n.salePrice=(c+p).toFixed(2);
        n.profitTotal=(p*q).toFixed(2);
      }
      return n;
    }));
  };

  const updSrc=(iid,sid,field,val)=>onChange(items.map(it=>{
    if(it.id!==iid)return it;
    return{...it,costSources:(it.costSources||[]).map(s=>s.id===sid?{...s,[field]:val}:s)};
  }));
  const addSrc=(iid)=>{
    onChange(items.map(it=>it.id!==iid?it:{...it,costSources:[...(it.costSources||[]),blankSource()]}));
    setExpanded(p=>({...p,[iid]:true}));
  };
  const rmSrc=(iid,sid)=>onChange(items.map(it=>it.id!==iid?it:{...it,costSources:(it.costSources||[]).filter(s=>s.id!==sid)}));
  const useSrc=(iid,cost)=>updItem(iid,"cost",cost);

  const INP2={...INP,padding:"5px 8px",fontSize:13,background:"#f9fafb"};
  const th={padding:"7px 8px",color:C.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.4,textAlign:"left",whiteSpace:"nowrap",background:"#f9fafb",borderBottom:`1px solid ${C.border}`};
  const td={padding:"6px 8px",verticalAlign:"middle",borderBottom:`1px solid ${C.border}22`};
  const autoCell={background:"#dcfce7",borderRadius:5,padding:"5px 10px",textAlign:"center",fontWeight:700,color:"#15803d",fontSize:13,minWidth:90};
  const totalProfit=items.reduce((s,it)=>s+(parseFloat(it.profitTotal)||0),0);

  return(
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:900}}>
        <thead>
          <tr>
            <th style={{...th,width:28}}>#</th>
            <th style={th}>รายการสินค้า</th>
            <th style={{...th,width:62,textAlign:"center"}}>จำนวน</th>
            <th style={{...th,width:55,textAlign:"center"}}>หน่วย</th>
            <th style={{...th,width:90,textAlign:"center"}}>แหล่งทุน</th>
            <th style={{...th,width:108,color:C.accent}}>ทุน/หน่วย</th>
            <th style={{...th,width:108,color:C.orange}}>กำไร/หน่วย</th>
            <th style={{...th,width:115,color:C.green}}>ราคาขาย ⚡</th>
            <th style={{...th,width:108,color:C.green}}>กำไรรวม ⚡</th>
            <th style={{...th,minWidth:120}}>หมายเหตุ</th>
          </tr>
        </thead>
        <tbody>
          {items.map((it,i)=>{
            const srcs=it.costSources||[];
            const isOpen=!!expanded[it.id];
            return(
              <React.Fragment key={it.id}>
                {/* ── Main row ── */}
                <tr style={{background:isOpen?"#0d1e35":"transparent"}}>
                  <td style={{...td,color:C.muted,fontWeight:700}}>{i+1}</td>
                  <td style={td}><span style={{fontWeight:600}}>{it.product}</span></td>
                  <td style={{...td,textAlign:"center"}}>{it.qty}</td>
                  <td style={{...td,textAlign:"center",color:C.muted}}>{it.unit}</td>

                  {/* แหล่งทุน toggle */}
                  <td style={{...td,textAlign:"center"}}>
                    <button onClick={()=>toggle(it.id)} style={{
                      background:srcs.length>0?"#1e3a5f":"#1a2535",
                      border:`1px solid ${srcs.length>0?C.blue:C.border}`,
                      borderRadius:6,color:srcs.length>0?C.blue:C.muted,
                      padding:"4px 8px",cursor:"pointer",fontSize:11,fontWeight:700,
                      whiteSpace:"nowrap",
                    }}>
                      {isOpen?"▾":"▸"} {srcs.length>0?`${srcs.length} แหล่ง`:"เพิ่ม"}
                    </button>
                  </td>

                  {/* ทุน/หน่วย */}
                  <td style={td}>
                    {readOnly
                      ?<span style={{color:C.accent}}>{parseFloat(it.cost||0).toLocaleString()}</span>
                      :<input value={it.cost} type="number" onChange={e=>updItem(it.id,"cost",e.target.value)} placeholder="0.00" style={{...INP2,color:C.accent,width:"100%"}}/>
                    }
                  </td>

                  {/* กำไร/หน่วย */}
                  <td style={td}>
                    {readOnly
                      ?<span style={{color:C.orange}}>{parseFloat(it.profit||0).toLocaleString()}</span>
                      :<input value={it.profit} type="number" onChange={e=>updItem(it.id,"profit",e.target.value)} placeholder="0.00" style={{...INP2,color:C.orange,width:"100%"}}/>
                    }
                  </td>

                  {/* ราคาขาย (auto) */}
                  <td style={td}><div style={autoCell}>{it.salePrice?parseFloat(it.salePrice).toLocaleString():"—"}</div></td>

                  {/* กำไรรวม (auto) */}
                  <td style={td}><div style={autoCell}>{it.profitTotal?parseFloat(it.profitTotal).toLocaleString():"—"}</div></td>

                  {/* หมายเหตุ */}
                  <td style={td}>
                    {readOnly
                      ?<span style={{color:it.note?C.text:C.muted,fontSize:12}}>{it.note||"—"}</span>
                      :<input value={it.note||""} onChange={e=>updItem(it.id,"note",e.target.value)} placeholder="หมายเหตุ" style={{...INP2,width:"100%"}}/>
                    }
                  </td>
                </tr>

                {/* ── Expanded cost sources row ── */}
                {isOpen&&(
                  <tr>
                    <td colSpan={10} style={{background:"#f3f4f6",padding:"8px 12px 12px 40px",borderBottom:`1px solid ${C.border}`}}>
                      <div style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:"uppercase",marginBottom:8,letterSpacing:0.5}}>แหล่งทุน</div>
                      {srcs.length===0&&!readOnly&&<div style={{color:C.muted,fontSize:12,marginBottom:8}}>ยังไม่มีแหล่งทุน</div>}
                      {srcs.map((s,si)=>(
                        <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                          <span style={{color:C.muted,fontSize:11,minWidth:16}}>{si+1}.</span>
                          {readOnly
                            ?<span style={{color:C.blue,fontWeight:700,minWidth:120,fontSize:13}}>{s.name||"—"}</span>
                            :<input value={s.name} onChange={e=>updSrc(it.id,s.id,"name",e.target.value)} placeholder="ชื่อแหล่งทุน" style={{...INP2,width:140,color:C.blue}}/>
                          }
                          {readOnly
                            ?<span style={{color:C.accent,fontWeight:700,fontSize:13}}>{parseFloat(s.cost||0).toLocaleString()} ฿</span>
                            :<input value={s.cost} type="number" onChange={e=>updSrc(it.id,s.id,"cost",e.target.value)} placeholder="ทุน/หน่วย" style={{...INP2,width:90,color:C.accent}}/>
                          }
                          {/* checkboxes */}
                          {["vat","delivery","unloading"].map(f=>(
                            <label key={f} style={{display:"flex",alignItems:"center",gap:3,cursor:readOnly?"default":"pointer",fontSize:11,color:s[f]?C.green:C.muted,userSelect:"none"}}>
                              <input type="checkbox" checked={!!s[f]} onChange={e=>!readOnly&&updSrc(it.id,s.id,f,e.target.checked)} disabled={readOnly}/>
                              {f==="vat"?"VAT":f==="delivery"?"ส่ง":"ลง"}
                            </label>
                          ))}
                          {!readOnly&&s.cost&&(
                            <button onClick={()=>useSrc(it.id,s.cost)} style={{background:"#1e3a5f",border:`1px solid ${C.blue}44`,borderRadius:5,color:C.blue,padding:"3px 8px",cursor:"pointer",fontSize:11}}>ใช้ ↓</button>
                          )}
                          {!readOnly&&<button onClick={()=>rmSrc(it.id,s.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 2px"}}>×</button>}
                        </div>
                      ))}
                      {!readOnly&&(
                        <button onClick={()=>addSrc(it.id)} style={{marginTop:4,background:"none",border:`1px dashed ${C.border}`,borderRadius:5,color:C.muted,padding:"4px 12px",cursor:"pointer",fontSize:11}}>+ เพิ่มแหล่งทุน</button>
                      )}
                    </td>
                  </tr>
                )}
              </React.Fragment>
            );
          })}

          {/* Total row */}
          {totalProfit>0&&(
            <tr style={{borderTop:`1px solid ${C.border}`}}>
              <td colSpan={8} style={{...td,textAlign:"right",color:C.muted,fontSize:12}}>กำไรรวมทั้งหมด</td>
              <td style={{...td,color:C.green,fontWeight:800,fontSize:15}}>{totalProfit.toLocaleString()}</td>
              <td style={td}></td>
            </tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

// EDIT ORDER FORM (sales, pending only)
// ══════════════════════════════════════
function EditOrderForm({order,onSaved,onCancel}){
  const [f,setF]=useState({
    customerName:order.customerName||"",
    customerPhone:order.customerPhone||"",
    projectLocation:order.projectLocation||"",
    customerLocation:order.customerLocation||"",
    creditTerm:order.creditTerm||"",
    requestedDelivery:order.requestedDelivery||"",
    orderNote:order.orderNote||"",
    photo:order.photo||"",
    items:order.items||[blank()],
  });
  const [saving,setSaving]=useState(false);
  const [sugg,setSugg]=useState({customers:[],projects:[]});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  useEffect(()=>{
    db.collection("orders").where("salesperson","==",order.salesperson).get().then(snap=>{
      const cm={};const ps=new Set();
      snap.docs.forEach(d=>{const o=d.data();if(o.customerName)cm[o.customerName]=o.customerPhone||"";if(o.projectLocation)ps.add(o.projectLocation);});
      db.collection("orders").get().then(snap2=>{
        snap2.docs.forEach(d=>{const o=d.data();if(o.projectLocation)ps.add(o.projectLocation);});
        setSugg({customers:Object.entries(cm).map(([n,p])=>({label:n,sub:p,phone:p})),projects:[...ps].map(p=>({label:p}))});
      });
    });
  },[]);

  const handlePhoto=async e=>{const file=e.target.files[0];if(!file)return;set("photo",await compress(file));};

  const save=async()=>{
    if(!f.customerName||!f.projectLocation||f.items.some(i=>!i.product||!i.qty))return alert("กรุณากรอกข้อมูลให้ครบ");
    setSaving(true);
    try{
      await db.collection("orders").doc(order.id).update({
        customerName:f.customerName,customerPhone:f.customerPhone,
        projectLocation:f.projectLocation,customerLocation:f.customerLocation,
        creditTerm:f.creditTerm,orderNote:f.orderNote||"",requestedDelivery:f.requestedDelivery||"",photo:f.photo,items:f.items,
      });
      onSaved();
    }catch(e){alert("เกิดข้อผิดพลาด: "+e.message);setSaving(false);}
  };

  const card={background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:16};
  const coordsOk=f.customerLocation&&extractCoords(f.customerLocation);

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
        <Btn variant="ghost" onClick={onCancel} small>← ยกเลิก</Btn>
        <h2 style={{margin:0,fontSize:19,fontWeight:700}}>แก้ไขคำสั่งซื้อ</h2>
        <span style={{background:"#fef3c7",color:"#b45309",border:"1px solid #fcd34d",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:700}}>ยังไม่ถูกดำเนินการ</span>
      </div>
      <div style={card}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:16,marginBottom:16}}>
          <div><Lbl>ฝ่ายขาย</Lbl><div style={{color:C.accent,fontWeight:700,fontSize:16,padding:"10px 0"}}>{order.salesperson}</div></div>
          <div><Lbl>ส่งที่ / โครงการ *</Lbl><AutoInput value={f.projectLocation} onChange={v=>set("projectLocation",v)} onSelect={s=>set("projectLocation",s.label)} suggestions={sugg.projects} placeholder="เช่น หลักสี่"/></div>
          <div><Lbl>ชื่อลูกค้า *</Lbl><AutoInput value={f.customerName} onChange={v=>set("customerName",v)} onSelect={s=>{set("customerName",s.label);set("customerPhone",s.phone||"");}} suggestions={sugg.customers} placeholder="ชื่อลูกค้า"/></div>
          <div><Lbl>เบอร์โทร</Lbl><input value={f.customerPhone} onChange={e=>set("customerPhone",fmtPhone(e.target.value))} placeholder="094-994-9978" type="tel" style={INP}/></div>
        </div>
        <div style={{marginBottom:16}}>
          <Lbl>Credit Term</Lbl>
          <CreditTermSelector value={f.creditTerm} onChange={v=>set("creditTerm",v)}/>
        </div>
        <div style={{marginBottom:16}}>
          <Lbl>กำหนดส่งที่ต้องการ</Lbl>
          <input type="date" value={f.requestedDelivery} onChange={e=>set("requestedDelivery",e.target.value)} style={{...INP,colorScheme:"light"}}/>
        </div>
        <div style={{marginBottom:16}}>
          <Lbl>ลิงก์ Google Maps ของลูกค้า (ถ้ามี)</Lbl>
          <input value={f.customerLocation} onChange={e=>set("customerLocation",e.target.value)} placeholder="วางลิงก์จาก address bar ของ Google Maps..." style={{...INP,fontSize:13}}/>
          {f.customerLocation&&<div style={{marginTop:6,fontSize:12}}>{coordsOk?<span style={{color:C.green}}>✅ อ่านพิกัดได้</span>:<span style={{color:C.orange}}>⚠️ ใช้ลิงก์จาก address bar</span>}</div>}
        </div>
        <div><Lbl>แนบรูปใบเสนอราคา (ถ้ามี)</Lbl>
          <input type="file" accept="image/*" onChange={handlePhoto} style={{color:C.muted,fontSize:13}}/>
          {f.photo&&<img src={f.photo} alt="" style={{marginTop:10,maxWidth:"100%",maxHeight:200,borderRadius:8}}/>}
        </div>
      </div>
      <div style={card}>
        <Lbl>หมายเหตุถึงจัดซื้อ (ถ้ามี)</Lbl>
        <textarea value={f.orderNote} onChange={e=>set("orderNote",e.target.value)} placeholder="เช่น ลูกค้าเลือกอย่างใดอย่างหนึ่ง, รีบด่วน..." rows={3} style={{...INP,resize:"vertical",lineHeight:1.6,fontSize:14}}/>
      </div>
      <div style={card}><Lbl>รายการสินค้า *</Lbl><ItemsTable items={f.items} onChange={v=>set("items",v)} mode="edit-base"/></div>
      <div style={{display:"flex",gap:12}}>
        <Btn onClick={save} disabled={saving}>{saving?"กำลังบันทึก...":"💾 บันทึกการแก้ไข"}</Btn>
        <Btn variant="ghost" onClick={onCancel}>ยกเลิก</Btn>
      </div>
    </div>
  );
}

// ORDER DETAIL
// ══════════════════════════════════════
function OrderDetail({order,role,onBack,onUpdated}){
  const [items,setItems]=useState(order.items.map(it=>({...it,costSources:it.costSources||[],note:it.note||""})));
  const [vatMode,setVatMode]=useState(order.vatMode||"cash");
  const [saving,setSaving]=useState(false);
  const [editing,setEditing]=useState(false);
  const [isRevising,setIsRevising]=useState(false);
  const [revisingItems,setRevisingItems]=useState(null);
  const [showHistory,setShowHistory]=useState(false);

  // ── All hooks MUST come before any conditional return ──
  // Clear hasNewRevision when sales opens an approved order
  useEffect(()=>{
    if(role==="sales"&&order.status==="approved"&&order.hasNewRevision){
      db.collection("orders").doc(order.id).update({hasNewRevision:false});
    }
  },[]);

  const revCount=order.revisionCount||0;

  const startRevising=()=>{
    setRevisingItems(items.map(it=>({...it,costSources:it.costSources||[]})));
    setIsRevising(true);
  };

  const saveRevision=async()=>{
    if(!revisingItems||revisingItems.some(it=>!it.cost||!it.profit))return alert("กรุณาใส่ทุนและกำไร/หน่วยให้ครบทุกรายการ");
    setSaving(true);
    const label=revCount===0?"ต้นฉบับ":`Rev ${revCount}`;
    const snapshot={
      revNumber:revCount,
      label,
      items:order.items.map(it=>({...it})),
      savedAt:new Date().toLocaleString("th-TH"),
    };
    await db.collection("orders").doc(order.id).update({
      items:revisingItems,
      revisions:firebase.firestore.FieldValue.arrayUnion(snapshot),
      revisionCount:revCount+1,
      hasNewRevision:true,
      approvedAt:firebase.firestore.FieldValue.serverTimestamp(),
    });
    setSaving(false);setIsRevising(false);setRevisingItems(null);onUpdated();
  };

  // ── Conditional return (after all hooks) ──
  // Sales can edit while still pending
  if(editing&&role==="sales"&&order.status==="pending_cost"){
    return<EditOrderForm order={order} onSaved={()=>{setEditing(false);onUpdated();}} onCancel={()=>setEditing(false)}/>;
  }

  const canEdit=role==="purchasing"&&order.status==="pending_cost";
  const isApproved=order.status==="approved";

  const updateVat=async mode=>{setVatMode(mode);await db.collection("orders").doc(order.id).update({vatMode:mode});};

  const approve=async()=>{
    if(items.some(it=>!it.cost||!it.profit))return alert("กรุณาใส่ทุนและกำไร/หน่วยให้ครบทุกรายการ");
    setSaving(true);
    await db.collection("orders").doc(order.id).update({
      items,status:"approved",
      approvedAt:firebase.firestore.FieldValue.serverTimestamp(),
    });
    setSaving(false);onUpdated();
  };

  const card={background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:16};

  // Meta rows
  const metaItems=[
    ["ฝ่ายขาย",order.salesperson],["วันที่",order.date],
    ["ชื่อลูกค้า",order.customerName],["เบอร์โทร",order.customerPhone||"—"],
    ["ส่งที่/โครงการ",order.projectLocation],
    ...(order.creditTerm?[["Credit Term",order.creditTerm]]:[]),
    ...(order.requestedDelivery?[["📅 กำหนดส่ง (ต้องการ)",order.requestedDelivery]]:[]),
    ...(order.confirmedDelivery?[["🚚 กำหนดส่ง (ยืนยัน)",order.confirmedDelivery]]:[]),
  ];

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:24}}>
        <Btn variant="ghost" onClick={onBack} small>← กลับ</Btn>
        <h2 style={{margin:0,fontSize:17,fontWeight:700}}>{order.customerName} — {order.projectLocation}</h2>
        <Badge status={order.status}/>
        {role==="sales"&&order.status==="pending_cost"&&(
          <button onClick={()=>setEditing(true)} style={{marginLeft:"auto",background:"#1e3a5f",border:`1px solid ${C.blue}55`,borderRadius:8,color:C.blue,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:700}}>
            ✏️ แก้ไข
          </button>
        )}
      </div>

      {/* Meta */}
      <div style={card}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:14,marginBottom:14}}>
          {metaItems.map(([k,v])=>(
            <div key={k}>
              <div style={{color:C.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,marginBottom:3}}>{k}</div>
              <div style={{color:k==="Credit Term"?C.blue:C.text,fontWeight:600}}>{v}</div>
            </div>
          ))}
        </div>

        {/* Purchasing note to sales */}
        {order.purchasingNote&&order.status==="approved"&&(
          <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}33`}}>
            <div style={{color:C.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,marginBottom:6}}>📦 หมายเหตุจากจัดซื้อ</div>
            <div style={{background:"#fef9c3",border:"1px solid #fde047",borderRadius:8,padding:"10px 14px",fontSize:14,color:"#713f12",fontWeight:500,lineHeight:1.6}}>
              {order.purchasingNote}
            </div>
          </div>
        )}

        {/* Sales note to purchasing */}
        {order.orderNote&&(
          <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}33`}}>
            <div style={{color:C.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,marginBottom:6}}>📝 หมายเหตุจากฝ่ายขาย</div>
            <div style={{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:8,padding:"10px 14px",fontSize:14,color:"#92400e",fontWeight:500,lineHeight:1.6}}>
              {order.orderNote}
            </div>
          </div>
        )}

        {/* Purchasing: confirm delivery date */}
        {role==="purchasing"&&(
          <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}33`,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{color:C.muted,fontSize:12,fontWeight:700}}>🚚 ยืนยันวันส่ง:</div>
            <input type="date" defaultValue={order.confirmedDelivery||""} onChange={async e=>{await db.collection("orders").doc(order.id).update({confirmedDelivery:e.target.value});}}
              style={{...INP,width:"auto",padding:"6px 10px",fontSize:13,colorScheme:"light",flex:"0 0 auto"}}/>
            {order.confirmedDelivery&&<span style={{color:"#15803d",fontSize:13,fontWeight:600}}>✓ ยืนยัน: {order.confirmedDelivery}</span>}
          </div>
        )}

        {/* Timestamps */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,paddingTop:14,borderTop:`1px solid ${C.border}33`}}>
          <div>
            <div style={{color:C.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,marginBottom:3}}>🕐 เวลาขอราคา</div>
            <div style={{color:C.text,fontSize:13}}>{formatDT(order.createdAt)}</div>
          </div>
          <div>
            <div style={{color:C.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,marginBottom:3}}>✅ จัดซื้อส่งราคา</div>
            <div style={{color:isApproved?C.green:C.muted,fontSize:13}}>{isApproved?formatDT(order.approvedAt):"รอดำเนินการ"}</div>
          </div>
        </div>
      </div>

      {/* Maps (purchasing) */}
      {role==="purchasing"&&<MapsCard customerLocation={order.customerLocation}/>}

      {/* Photo */}
      {order.photo&&<div style={card}><Lbl>รูปใบเสนอราคา</Lbl><img src={order.photo} alt="quote" style={{maxWidth:"100%",maxHeight:320,borderRadius:8}}/></div>}

      {/* PURCHASING */}
      {role==="purchasing"&&(
        <div style={card}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <Lbl>รายการสินค้า{revCount>0&&<span style={{marginLeft:8,color:C.blue,fontWeight:400,textTransform:"none",fontSize:13}}>— Rev {revCount} (ปัจจุบัน)</span>}</Lbl>
            {isApproved&&!isRevising&&<button onClick={startRevising} style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,color:"#1d4ed8",padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:700}}>✏️ แก้ไขราคา → Rev {revCount+1}</button>}
            {isRevising&&<button onClick={()=>{setIsRevising(false);setRevisingItems(null);}} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,padding:"7px 14px",cursor:"pointer",fontSize:13}}>ยกเลิก</button>}
          </div>

          {canEdit&&<div style={{marginBottom:10,background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#1d4ed8"}}>
            💡 คลิก <strong>▸ เพิ่ม</strong> ที่คอลัมน์แหล่งทุน
          </div>}

          {isRevising&&revisingItems?(
            <>
              <div style={{marginBottom:12,background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#1d4ed8"}}>
                ✏️ แก้ไขราคา — ราคาเดิมจะถูกบันทึกเป็น <strong>{revCount===0?"ต้นฉบับ":`Rev ${revCount}`}</strong> ราคาใหม่จะเป็น <strong>Rev {revCount+1}</strong>
              </div>
              <PurchasingGrid
                items={revisingItems}
                initSources={order.orderSources||[]}
                readOnly={false}
                saving={saving}
                onApprove={async(updatedItems,sources,pNote)=>{
                  setSaving(true);
                  const label=revCount===0?"ต้นฉบับ":`Rev ${revCount}`;
                  const snapshot={revNumber:revCount,label,items:order.items.map(it=>({...it})),orderSources:order.orderSources||[],savedAt:new Date().toLocaleString("th-TH")};
                  await db.collection("orders").doc(order.id).update({items:updatedItems,orderSources:sources,purchasingNote:pNote||"",revisions:firebase.firestore.FieldValue.arrayUnion(snapshot),revisionCount:revCount+1,hasNewRevision:true,approvedAt:firebase.firestore.FieldValue.serverTimestamp()});
                  setSaving(false);setIsRevising(false);setRevisingItems(null);onUpdated();
                }}
              />
            </>
          ):canEdit?(
            <PurchasingGrid
              items={items}
              initSources={order.orderSources||[]}
              readOnly={false}
              saving={saving}
              onApprove={async(updatedItems,sources,pNote)=>{
                setSaving(true);
                await db.collection("orders").doc(order.id).update({items:updatedItems,orderSources:sources,purchasingNote:pNote||"",status:"approved",approvedAt:firebase.firestore.FieldValue.serverTimestamp()});
                setSaving(false);onUpdated();
              }}
            />
          ):(
            <PurchasingGrid
              items={items}
              initSources={order.orderSources||[]}
              readOnly={true}
            />
          )}

          {/* Revision history for purchasing */}
          {isApproved&&order.revisions&&order.revisions.length>0&&(
            <div style={{marginTop:16,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
              <button onClick={()=>setShowHistory(h=>!h)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,padding:0,fontFamily:"'Sarabun',sans-serif"}}>
                {showHistory?"▾":"▸"} ประวัติการแก้ไข ({order.revisions.length} ครั้ง)
              </button>
              {showHistory&&order.revisions.slice().reverse().map(rev=>(
                <div key={rev.revNumber} style={{marginTop:10,background:"#f9fafb",border:`1px solid ${C.border}`,borderRadius:8,padding:12}}>
                  <div style={{color:C.blue,fontWeight:700,marginBottom:6}}>{rev.label} — <span style={{color:C.muted,fontWeight:400,fontSize:12}}>{rev.savedAt}</span></div>
                  {rev.items.map((it,i)=><div key={i} style={{fontSize:13,color:C.muted,marginBottom:3}}>{i+1}. {it.product} ×{it.qty} {it.unit} | ทุน: {it.cost} | กำไร: {it.profit} | ราคาขาย: {it.salePrice}</div>)}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* SALES PENDING */}
      {role==="sales"&&!isApproved&&(
        <div style={card}>
          <Lbl>รายการสินค้า</Lbl>
          <ItemsTable items={items} onChange={()=>{}} mode="view-basic"/>
          <div style={{marginTop:16,background:"#3d1c0244",border:`1px solid ${C.accent}44`,borderRadius:8,padding:"12px 16px",color:C.accent,fontSize:13}}>
            ⏳ รอจัดซื้อดำเนินการ — ราคาขายยังไม่พร้อม
          </div>
        </div>
      )}

      {/* SALES APPROVED = ใบเสนอราคา */}
      {role==="sales"&&isApproved&&(
        <>
          {/* Revision notification */}
          {revCount>0&&(
            <div style={{...card,background:"#eff6ff",border:"1px solid #bfdbfe",marginBottom:0}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <span style={{color:"#1d4ed8",fontWeight:700,fontSize:14}}>📋 ราคาปัจจุบัน: Rev {revCount}</span>
                  <span style={{color:C.muted,fontSize:13,marginLeft:12}}>จัดซื้อได้ทำการแก้ไขราคา {revCount} ครั้ง</span>
                </div>
                {order.revisions&&order.revisions.length>0&&(
                  <button onClick={()=>setShowHistory(h=>!h)} style={{background:"none",border:"1px solid #bfdbfe",borderRadius:6,color:"#1d4ed8",cursor:"pointer",fontSize:12,padding:"5px 12px",fontFamily:"'Sarabun',sans-serif"}}>
                    {showHistory?"ซ่อนประวัติ":"ดูประวัติการแก้ไข"}
                  </button>
                )}
              </div>
              {showHistory&&order.revisions&&order.revisions.slice().reverse().map(rev=>(
                <div key={rev.revNumber} style={{marginTop:10,background:"#f9fafb",border:`1px solid ${C.border}`,borderRadius:8,padding:12}}>
                  <div style={{color:C.muted,fontWeight:700,marginBottom:6,fontSize:13}}>{rev.label} — <span style={{fontWeight:400,fontSize:12}}>{rev.savedAt}</span></div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,color:C.muted}}>
                    <thead><tr style={{borderBottom:`1px solid ${C.border}`}}><th style={{textAlign:"left",padding:"4px 6px"}}>รายการ</th><th style={{textAlign:"center",padding:"4px 6px"}}>จำนวน</th><th style={{textAlign:"right",padding:"4px 6px"}}>ราคาขาย/หน่วย</th><th style={{textAlign:"right",padding:"4px 6px"}}>รวม</th></tr></thead>
                    <tbody>{rev.items.map((it,i)=><tr key={i}><td style={{padding:"4px 6px"}}>{it.product}</td><td style={{padding:"4px 6px",textAlign:"center"}}>{it.qty} {it.unit}</td><td style={{padding:"4px 6px",textAlign:"right"}}>{parseFloat(it.salePrice||0).toLocaleString()}</td><td style={{padding:"4px 6px",textAlign:"right"}}>{(parseFloat(it.salePrice||0)*parseFloat(it.qty||0)).toLocaleString()}</td></tr>)}</tbody>
                  </table>
                </div>
              ))}
            </div>
          )}
          <QuotationDoc order={{...order,revisionCount:revCount}} items={items} vatMode={vatMode} onVatChange={updateVat}/>
        </>
      )}

      {canEdit&&(
        <Btn variant="green" onClick={approve} disabled={saving} full>
          {saving?"กำลังบันทึก...":"✅ อนุมัติราคาขาย"}
        </Btn>
      )}
    </div>
  );
}

// ══════════════════════════════════════
// ORDER CARD / STATS / MAIN APP
// ══════════════════════════════════════
function OrderCard({order,onClick,showProfit,role}){
  const tot=order.items.reduce((s,it)=>s+(parseFloat(it.profitTotal)||0),0);
  const fu=order.followUpStatus;
  const showFU=role==="purchasing"&&order.status==="approved";
  const setFollowUp=async(status,e)=>{e.stopPropagation();await db.collection("orders").doc(order.id).update({followUpStatus:status});};

  return(
    <div onClick={onClick} className="ocard" style={{background:C.surface,border:`1px solid ${fu==="passed"?"#86efac":fu==="failed"?"#fca5a5":C.border}`,borderRadius:12,padding:18,marginBottom:10,cursor:"pointer",transition:"border-color .15s,background .15s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,fontSize:15,color:C.text}}>{order.customerName}</span>
            <span style={{color:C.muted}}>·</span>
            <span style={{color:C.accent,fontWeight:600}}>{order.projectLocation}</span>
            {order.creditTerm&&<span style={{background:"#eff6ff",color:"#1d4ed8",border:"1px solid #bfdbfe",borderRadius:12,padding:"2px 9px",fontSize:11,fontWeight:600}}>{order.creditTerm}</span>}
          </div>
          <div style={{color:C.muted,fontSize:12,marginBottom:8}}>
            ฝ่ายขาย: {order.salesperson} · {order.date}
            {order.createdAt&&<span style={{marginLeft:10,color:"#2563eb"}}>🕐 {formatTime(order.createdAt)}</span>}
            {(order.confirmedDelivery||order.requestedDelivery)&&<span style={{marginLeft:10,color:"#15803d",fontWeight:600}}>🚚 {order.confirmedDelivery||order.requestedDelivery}</span>}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{order.items.map(it=><span key={it.id} style={{background:"#eff6ff",color:"#1d4ed8",border:"1px solid #bfdbfe",borderRadius:5,padding:"2px 9px",fontSize:11}}>{it.product} ×{it.qty} {it.unit}</span>)}</div>

          {/* Follow-up buttons — purchasing, approved orders only */}
          {showFU&&(
            <div onClick={e=>e.stopPropagation()} style={{marginTop:12,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{color:C.muted,fontSize:12,fontWeight:600}}>ราคาผ่านไหม?</span>
              <button onClick={e=>setFollowUp(fu==="passed"?null:"passed",e)} style={{
                background:fu==="passed"?"#16a34a":"#f0fdf4",
                color:fu==="passed"?"#fff":"#16a34a",
                border:"1px solid #86efac",borderRadius:8,
                padding:"5px 14px",cursor:"pointer",fontSize:13,fontWeight:700,
                transition:"all .15s",
              }}>✓ ผ่าน</button>
              <button onClick={e=>setFollowUp(fu==="failed"?null:"failed",e)} style={{
                background:fu==="failed"?"#dc2626":"#fef2f2",
                color:fu==="failed"?"#fff":"#dc2626",
                border:"1px solid #fca5a5",borderRadius:8,
                padding:"5px 14px",cursor:"pointer",fontSize:13,fontWeight:700,
                transition:"all .15s",
              }}>✗ ไม่ผ่าน</button>
              {!fu&&<span style={{color:C.muted,fontSize:11,fontStyle:"italic"}}>ยังไม่ได้ติดตาม</span>}
            </div>
          )}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,flexShrink:0}}>
          <Badge status={order.status}/>
          {order.hasNewRevision&&<span style={{background:"#eff6ff",color:"#1d4ed8",border:"1px solid #bfdbfe",borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700,animation:"pulse 1.5s infinite"}}>ราคาแก้ไข ⚡</span>}
          {(order.revisionCount||0)>0&&order.status==="approved"&&!order.hasNewRevision&&<span style={{background:"#f3f4f6",color:C.muted,borderRadius:6,padding:"2px 9px",fontSize:11}}>Rev {order.revisionCount}</span>}
          {showProfit&&order.status==="approved"&&tot>0&&<span style={{color:"#15803d",fontWeight:700}}>฿{tot.toLocaleString()}</span>}
        </div>
      </div>
    </div>
  );
}

function StatsBar({orders}){
  const appr=orders.filter(o=>o.status==="approved"),pend=orders.filter(o=>o.status==="pending_cost");
  const tot=appr.reduce((s,o)=>s+o.items.reduce((ss,it)=>ss+(parseFloat(it.profitTotal)||0),0),0);
  const passed=appr.filter(o=>o.followUpStatus==="passed").length;
  const failed=appr.filter(o=>o.followUpStatus==="failed").length;
  const pending=appr.filter(o=>!o.followUpStatus).length;
  const box={background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 18px",flex:1};
  return(
    <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
      <div style={box}><div style={{fontSize:18,fontWeight:800,color:"#15803d",marginBottom:2}}>฿{tot.toLocaleString()}</div><div style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>กำไรรวม</div></div>
      <div style={box}><div style={{fontSize:18,fontWeight:800,marginBottom:2}}>{appr.length}</div><div style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>อนุมัติแล้ว</div></div>
      <div style={box}><div style={{fontSize:18,fontWeight:800,color:C.accent,marginBottom:2}}>{pend.length}</div><div style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>รอดำเนินการ</div></div>
      <div style={{...box,border:"1px solid #bbf7d0"}}><div style={{fontSize:18,fontWeight:800,color:"#15803d",marginBottom:2}}>{passed}</div><div style={{fontSize:11,color:"#15803d",fontWeight:700,textTransform:"uppercase"}}>ราคาผ่าน ✓</div></div>
      <div style={{...box,border:"1px solid #fecaca"}}><div style={{fontSize:18,fontWeight:800,color:"#dc2626",marginBottom:2}}>{failed}</div><div style={{fontSize:11,color:"#dc2626",fontWeight:700,textTransform:"uppercase"}}>ไม่ผ่าน ✗</div></div>
      <div style={{...box,borderStyle:"dashed"}}><div style={{fontSize:18,fontWeight:800,color:C.muted,marginBottom:2}}>{pending}</div><div style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>ยังไม่ตอบ</div></div>
    </div>
  );
}

function MainApp({user,role,onLogout}){
  const [orders,setOrders]=useState([]),[ page,setPage]=useState("list"),[active,setActive]=useState(null),[filter,setFilter]=useState("all"),[dateFilter,setDateFilter]=useState(""),[search,setSearch]=useState("");
  useEffect(()=>{
    const unsub=db.collection("orders").orderBy("createdAt","desc").onSnapshot(snap=>{
      let all=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(role==="sales")all=all.filter(o=>o.salesperson===user.name);
      setOrders(all);
    },err=>console.error(err));
    return unsub;
  },[role,user.name]);

  // Convert HTML date (2026-04-16) to order date format (16-4-2026)
  const htmlToOrderDate=d=>{if(!d)return null;const[y,m,dy]=d.split("-");return `${parseInt(dy)}-${parseInt(m)}-${y}`;};
  const selectedDate=htmlToOrderDate(dateFilter);
  const displayed=orders
    .filter(o=>{
      if(filter==="all") return true;
      if(filter==="pending") return o.status==="pending_cost";
      if(filter==="approved") return o.status==="approved";
      if(filter==="passed") return o.status==="approved"&&o.followUpStatus==="passed";
      if(filter==="failed") return o.status==="approved"&&o.followUpStatus==="failed";
      return true;
    })
    .filter(o=>!selectedDate||o.date===selectedDate)
    .filter(o=>{
      if(!search)return true;
      const q=search.toLowerCase();
      return(o.customerName||"").toLowerCase().includes(q)||
             (o.projectLocation||"").toLowerCase().includes(q)||
             (o.salesperson||"").toLowerCase().includes(q)||
             (o.items||[]).some(it=>(it.product||"").toLowerCase().includes(q));
    });

  return(
    <div style={{background:C.bg,minHeight:"100vh"}}>
      <nav style={{background:"#ffffff",borderBottom:`1px solid ${C.border}`,boxShadow:"0 1px 4px #0000000f",padding:"0 16px",display:"flex",alignItems:"center",position:"sticky",top:0,zIndex:100,gap:10}}>
        <img src={LOGO_SRC} alt="BKT" style={{height:34,width:"auto",padding:"6px 0",marginRight:8,filter:"none"}}/>
        <span style={{color:C.muted,fontSize:13,flex:1}}>{role==="sales"?"👤 ฝ่ายขาย":"📦 จัดซื้อ"} · {user.name}</span>
        {role==="purchasing"&&<button onClick={()=>exportExcel(orders)} style={{background:C.green,color:"#000",border:"none",borderRadius:8,padding:"8px 12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>⬇ Excel</button>}
        <button onClick={onLogout} style={{background:"#f0f2f7",border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,padding:"8px 12px",cursor:"pointer",fontSize:13}}>ออก</button>
      </nav>
      <div style={{maxWidth:900,margin:"0 auto",padding:"24px 14px"}}>
        {page==="new"?<NewOrderForm userName={user.name} onDone={()=>setPage("list")} onCancel={()=>setPage("list")}/>
        :page==="detail"&&active?<OrderDetail order={active} role={role} onBack={()=>{setPage("list");setActive(null);}} onUpdated={()=>{setPage("list");setActive(null);}}/>
        :(
          <div>
            {role==="purchasing"&&<StatsBar orders={orders}/>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:10}}>
              <h2 style={{margin:0,fontSize:18,fontWeight:700}}>{role==="sales"?"📋 คำสั่งซื้อของฉัน":"📦 คำสั่งซื้อทั้งหมด"} <span style={{color:C.muted,fontSize:14,fontWeight:400}}>({displayed.length})</span></h2>
              {role==="sales"&&<Btn onClick={()=>setPage("new")}>+ คำสั่งซื้อใหม่</Btn>}
            </div>
            <div style={{position:"relative",marginBottom:14}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.muted,fontSize:16,pointerEvents:"none"}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ค้นหาลูกค้า, สินค้า, โครงการ, ฝ่ายขาย..." style={{...INP,paddingLeft:38,fontSize:14}}/>
              {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}
            </div>
            {role==="purchasing"&&(
              <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
                {/* Status tabs */}
                {[
                  ["all","ทั้งหมด",null],
                  ["pending","รอดำเนินการ","#b45309"],
                  ["approved","อนุมัติแล้ว","#15803d"],
                  ["passed","ผ่าน ✓","#16a34a"],
                  ["failed","ไม่ผ่าน ✗","#dc2626"],
                ].map(([v,l,col])=>(
                  <button key={v} onClick={()=>setFilter(v)} style={{
                    background:filter===v?(col||C.accent)+"22":"none",
                    border:`1px solid ${filter===v?(col||C.accent):C.border}`,
                    color:filter===v?(col||C.accent):C.muted,
                    borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:filter===v?700:400,
                    whiteSpace:"nowrap",
                  }}>{l}</button>
                ))}

                {/* Divider */}
                <div style={{width:1,height:28,background:C.border,margin:"0 4px"}}></div>

                {/* Date filter */}
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{color:C.muted,fontSize:13}}>📅</span>
                  <input
                    type="date"
                    value={dateFilter}
                    onChange={e=>setDateFilter(e.target.value)}
                    style={{
                      background:"#f9fafb",border:`1px solid ${dateFilter?C.accent:C.border}`,
                      borderRadius:8,color:dateFilter?C.accent:C.muted,padding:"7px 10px",
                      fontSize:13,cursor:"pointer",fontFamily:"'Sarabun',sans-serif",
                      colorScheme:"light",
                    }}
                  />
                  {dateFilter&&(
                    <button onClick={()=>setDateFilter("")} style={{
                      background:"none",border:"none",color:C.muted,cursor:"pointer",
                      fontSize:18,lineHeight:1,padding:"0 2px",
                    }} title="ล้างวันที่">×</button>
                  )}
                </div>

                {/* Result count when date filtered */}
                {dateFilter&&(
                  <span style={{color:C.muted,fontSize:12,marginLeft:4}}>
                    พบ {displayed.length} รายการ วันที่ {htmlToOrderDate(dateFilter)}
                  </span>
                )}
              </div>
            )}
            {displayed.length===0?<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:48,textAlign:"center",color:C.muted,fontSize:15}}>{role==="sales"?"ยังไม่มีคำสั่งซื้อ กด \"+ คำสั่งซื้อใหม่\"":"ไม่มีรายการ"}</div>
            :displayed.map(o=><OrderCard key={o.id} order={o} showProfit={role==="purchasing"} role={role} onClick={()=>{setActive(o);setPage("detail");}}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [s,setS]=useState(null);
  if(!s)return<LoginScreen onLogin={(pin,user)=>{if(user.roles.length===1)setS({user,role:user.roles[0]});else setS({user,role:null});}}/>;
  if(!s.role)return<RoleSelect user={s.user} onSelect={role=>setS(p=>({...p,role}))}/>;
  return<MainApp user={s.user} role={s.role} onLogout={()=>setS(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
